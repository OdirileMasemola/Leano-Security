<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login - Leano Security</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>Leano Admin</h1>
            <p>Access your dashboard</p>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="admin@leanosecurity.co.za"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <div id="errorMessage" class="error-message" style="display: none; color: #d62839; margin-bottom: 1rem; padding: 0.75rem; border-radius: 8px; background: #ffe0e6;"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">
                    Sign In
                </button>

                <p style="text-align: center; color: #999; font-size: 0.85rem;">
                    This area is restricted to authorized personnel only
                </p>
            </form>
        </div>
    </div>

    <script type="module">
        import adminAuth from '../js/admin-auth.js';

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const result = await adminAuth.login(email, password);

            if (result.success) {
                // Redirect to dashboard
                window.location.href = '/admin/dashboard.html';
            } else {
                // Show error message
                errorMessage.textContent = result.error || 'Login failed';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
